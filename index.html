<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Movie Favourites</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-warning: #faeeda;
    --text: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-warning: #633806;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
    --accent: #1a1a18;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-warning: #412402;
      --text: #f0ede8;
      --text-secondary: #a0a09a;
      --text-warning: #FAC775;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.28);
      --accent: #f0ede8;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }

  #app {
    width: 100%;
    max-width: 680px;
  }

  header {
    margin-bottom: 1.5rem;
  }

  h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.25rem;
  }

  .tab {
    font-size: 14px;
    font-weight: 500;
    padding: 8px 18px;
    cursor: pointer;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    transition: color 0.15s;
  }

  .tab.active {
    color: var(--text);
    border-bottom: 2px solid var(--text);
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  input[type="text"] {
    flex: 1;
    height: 36px;
    padding: 0 12px;
    font-size: 14px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: var(--border-hover);
  }

  button.primary {
    height: 36px;
    padding: 0 16px;
    font-size: 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }

  button.primary:hover { background: var(--bg-secondary); }
  button.primary:active { transform: scale(0.98); }

  #results-area, #favs-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .movie-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: border-color 0.15s;
  }

  .movie-card:hover { border-color: var(--border-hover); }

  .poster {
    width: 54px;
    height: 80px;
    border-radius: var(--radius-md);
    object-fit: cover;
    background: var(--bg-secondary);
    flex-shrink: 0;
    cursor: pointer;
  }

  .poster-ph {
    width: 54px;
    height: 80px;
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
  }

  .card-body { flex: 1; min-width: 0; }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
    cursor: pointer;
  }

  .card-title:hover { opacity: 0.7; }

  .card-meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .fav-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    cursor: pointer;
    background: none;
    border: 0.5px solid var(--border);
    color: var(--text-secondary);
    transition: all 0.15s;
  }

  .fav-btn.active {
    background: var(--bg-warning);
    border-color: rgba(186,117,23,0.3);
    color: var(--text-warning);
  }

  .fav-btn:hover { border-color: var(--border-hover); }

  .small-btn {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 0.5px solid var(--border);
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s;
  }

  .small-btn:hover { background: var(--bg-secondary); }

  .detail-back {
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    margin-bottom: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
  }

  .detail-back:hover { color: var(--text); }

  .detail-panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }

  .detail-header {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .detail-poster {
    width: 90px;
    height: 132px;
    border-radius: var(--radius-md);
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg-secondary);
  }

  .detail-title {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .detail-meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .detail-plot {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .ratings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 8px;
    margin-top: 1rem;
  }

  .rating-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 0.75rem;
  }

  .rating-src {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 3px;
  }

  .rating-val {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
  }

  .rating-val span {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .rating-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .bar-wrap {
    margin-top: 5px;
    background: var(--border);
    border-radius: 4px;
    height: 3px;
    overflow: hidden;
  }

  .bar { height: 3px; border-radius: 4px; }

  .genre-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
  }

  .genres {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }

  .status {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    padding: 2rem;
  }

  .awards {
    font-size: 12px;
    color: var(--text-secondary);
    border-top: 0.5px solid var(--border);
    padding-top: 0.75rem;
    margin-top: 0.75rem;
  }

  .empty-favs {
    text-align: center;
    padding: 3rem 1rem;
  }

  .empty-favs svg {
    display: block;
    margin: 0 auto 1rem;
  }

  .empty-favs .empty-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .empty-favs .empty-sub {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .badge-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    border-radius: 999px;
    background: var(--bg-warning);
    color: var(--text-warning);
    font-size: 11px;
    font-weight: 500;
    padding: 0 5px;
    margin-left: 4px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 7h5M17 17h5"/></svg>
      Movie Favourites
    </h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('search')">Search</button>
      <button class="tab" onclick="switchTab('favs')" id="favs-tab">Favourites <span class="badge-count" id="fav-count" style="display:none">0</span></button>
    </div>
  </header>

  <div id="search-view">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search for a movie..." autofocus />
      <button class="primary" onclick="doSearch()">Search</button>
    </div>
    <div id="results-area"><p class="status">Search for any movie to get started.</p></div>
  </div>

  <div id="favs-view" style="display:none">
    <div id="favs-area"></div>
  </div>
</div>

<script>
let currentResults = [];
let detailFrom = 'search';
let favs = {};

try { favs = JSON.parse(localStorage.getItem('mf_favs') || '{}'); } catch(e) { favs = {}; }

function saveFavs() {
  try { localStorage.setItem('mf_favs', JSON.stringify(favs)); } catch(e) {}
  updateFavCount();
}

function updateFavCount() {
  const n = Object.keys(favs).length;
  const badge = document.getElementById('fav-count');
  badge.textContent = n;
  badge.style.display = n > 0 ? 'inline-flex' : 'none';
}

function isFav(id) { return !!favs[id]; }

function toggleFav(id, movieData) {
  if (favs[id]) { delete favs[id]; } else { favs[id] = movieData; }
  saveFavs();
  if (document.getElementById('search-view').style.display !== 'none') {
    renderList(currentResults);
  } else {
    renderFavs();
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tab === 'search') {
    document.querySelector('.tab:first-child').classList.add('active');
    document.getElementById('search-view').style.display = '';
    document.getElementById('favs-view').style.display = 'none';
  } else {
    document.querySelector('.tab:last-child').classList.add('active');
    document.getElementById('search-view').style.display = 'none';
    document.getElementById('favs-view').style.display = '';
    renderFavs();
  }
}

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const area = document.getElementById('results-area');
  area.innerHTML = '<p class="status">Searching...</p>';
  try {
    const res = await fetch(`https://www.omdbapi.com/?apikey=47f0ac8a&s=${encodeURIComponent(q)}&type=movie`);
    const data = await res.json();
    if (data.Response === 'False') { area.innerHTML = `<p class="status">${data.Error || 'No results found.'}</p>`; return; }
    currentResults = data.Search || [];
    renderList(currentResults);
  } catch(e) { area.innerHTML = '<p class="status">Error fetching results. Check your connection.</p>'; }
}

function barColor(pct) { return pct >= 70 ? '#2ecc40' : pct >= 50 ? '#f0a500' : '#e74c3c'; }

function renderList(movies) {
  const area = document.getElementById('results-area');
  if (!movies.length) { area.innerHTML = '<p class="status">No results.</p>'; return; }
  area.innerHTML = movies.map(m => {
    const faved = isFav(m.imdbID);
    const minimal = JSON.stringify({ imdbID: m.imdbID, Title: m.Title, Year: m.Year, Poster: m.Poster }).replace(/"/g, '&quot;');
    return `<div class="movie-card">
      ${m.Poster && m.Poster !== 'N/A'
        ? `<img class="poster" src="${m.Poster}" alt="${m.Title}" onclick="showDetail('${m.imdbID}','search')" />`
        : `<div class="poster-ph" onclick="showDetail('${m.imdbID}','search')">🎬</div>`}
      <div class="card-body">
        <div class="card-title" onclick="showDetail('${m.imdbID}','search')">${m.Title}</div>
        <div class="card-meta">${m.Year}</div>
        <div class="card-actions">
          <button class="fav-btn ${faved ? 'active' : ''}" onclick="toggleFav('${m.imdbID}', JSON.parse(this.dataset.m))" data-m="${minimal}">
            ${faved ? '♥ Saved' : '♡ Favourite'}
          </button>
          <button class="small-btn" onclick="showDetail('${m.imdbID}','search')">Ratings →</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderFavs() {
  const area = document.getElementById('favs-area');
  const keys = Object.keys(favs);
  if (!keys.length) {
    area.innerHTML = `<div class="empty-favs">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 34s-14-8.5-14-18A8 8 0 0 1 20 10a8 8 0 0 1 14 6c0 9.5-14 18-14 18z" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.3"/>
      </svg>
      <p class="empty-title">No favourites yet</p>
      <p class="empty-sub">Search for movies and tap the heart to save them here.</p>
    </div>`;
    return;
  }
  area.innerHTML = keys.map(id => {
    const m = favs[id];
    const minimal = JSON.stringify(m).replace(/"/g, '&quot;');
    return `<div class="movie-card">
      ${m.Poster && m.Poster !== 'N/A'
        ? `<img class="poster" src="${m.Poster}" alt="${m.Title}" onclick="showDetail('${m.imdbID}','favs')" />`
        : `<div class="poster-ph" onclick="showDetail('${m.imdbID}','favs')">🎬</div>`}
      <div class="card-body">
        <div class="card-title" onclick="showDetail('${m.imdbID}','favs')">${m.Title}</div>
        <div class="card-meta">${m.Year}</div>
        <div class="card-actions">
          <button class="fav-btn active" onclick="toggleFav('${m.imdbID}', JSON.parse(this.dataset.m))" data-m="${minimal}">♥ Remove</button>
          <button class="small-btn" onclick="showDetail('${m.imdbID}','favs')">Ratings →</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function showDetail(imdbId, from) {
  detailFrom = from;
  const view = from === 'search' ? document.getElementById('results-area') : document.getElementById('favs-area');
  view.innerHTML = '<p class="status">Loading...</p>';
  try {
    const res = await fetch(`https://www.omdbapi.com/?apikey=47f0ac8a&i=${imdbId}&plot=short`);
    const m = await res.json();
    if (m.Response === 'False') { view.innerHTML = '<p class="status">Could not load.</p>'; return; }

    const ratings = m.Ratings || [];
    const imdb = m.imdbRating !== 'N/A' ? m.imdbRating : null;
    const rt = ratings.find(r => r.Source === 'Rotten Tomatoes');
    const mc = ratings.find(r => r.Source === 'Metacritic');
    const rtVal = rt ? parseInt(rt.Value) : null;
    const mcVal = mc ? parseInt(mc.Value) : null;
    const faved = isFav(imdbId);
    const minimal = JSON.stringify({ imdbID: m.imdbID, Title: m.Title, Year: m.Year, Poster: m.Poster }).replace(/"/g, '&quot;');

    view.innerHTML = `
      <button class="detail-back" onclick="goBack()">← Back</button>
      <div class="detail-panel">
        <div class="detail-header">
          ${m.Poster && m.Poster !== 'N/A'
            ? `<img class="detail-poster" src="${m.Poster}" alt="${m.Title}" />`
            : `<div class="detail-poster" style="display:flex;align-items:center;justify-content:center;font-size:32px;">🎬</div>`}
          <div style="flex:1;min-width:0">
            <div class="detail-title">${m.Title}</div>
            <div class="detail-meta">${[m.Year, m.Rated !== 'N/A' ? m.Rated : null, m.Runtime !== 'N/A' ? m.Runtime : null].filter(Boolean).join(' · ')}</div>
            ${m.Genre && m.Genre !== 'N/A' ? `<div class="genres">${m.Genre.split(',').map(g=>`<span class="genre-tag">${g.trim()}</span>`).join('')}</div>` : ''}
            <div class="detail-plot">${m.Plot !== 'N/A' ? m.Plot : ''}</div>
            <button class="fav-btn ${faved ? 'active' : ''}" id="detail-fav-btn" onclick="toggleFavDetail(JSON.parse(this.dataset.m))" data-m="${minimal}">
              ${faved ? '♥ Saved to favourites' : '♡ Add to favourites'}
            </button>
          </div>
        </div>
        <div style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px">Ratings</div>
        <div class="ratings-grid">
          ${imdb ? `<div class="rating-card">
            <div class="rating-src">IMDb</div>
            <div class="rating-val">${imdb}<span>/10</span></div>
            <div class="rating-sub">${m.imdbVotes !== 'N/A' ? m.imdbVotes + ' votes' : ''}</div>
            <div class="bar-wrap"><div class="bar" style="width:${parseFloat(imdb)*10}%;background:${barColor(parseFloat(imdb)*10)}"></div></div>
          </div>` : ''}
          ${rtVal !== null ? `<div class="rating-card">
            <div class="rating-src">Rotten Tomatoes</div>
            <div class="rating-val">${rtVal}<span>%</span></div>
            <div class="rating-sub">${rtVal >= 60 ? 'Fresh' : 'Rotten'}</div>
            <div class="bar-wrap"><div class="bar" style="width:${rtVal}%;background:${barColor(rtVal)}"></div></div>
          </div>` : ''}
          ${mcVal !== null ? `<div class="rating-card">
            <div class="rating-src">Metacritic</div>
            <div class="rating-val">${mcVal}<span>/100</span></div>
            <div class="rating-sub">${mcVal >= 61 ? 'Favorable' : mcVal >= 40 ? 'Mixed' : 'Unfavorable'}</div>
            <div class="bar-wrap"><div class="bar" style="width:${mcVal}%;background:${barColor(mcVal)}"></div></div>
          </div>` : ''}
          ${!imdb && !rtVal && !mcVal ? '<p class="status" style="padding:0.5rem 0">No ratings available.</p>' : ''}
        </div>
        ${m.Awards && m.Awards !== 'N/A' ? `<div class="awards">Awards: ${m.Awards}</div>` : ''}
        ${m.Director && m.Director !== 'N/A' ? `<div class="awards" style="border-top:none;padding-top:0">Director: ${m.Director}</div>` : ''}
      </div>`;
  } catch(e) { view.innerHTML = '<p class="status">Error loading details.</p>'; }
}

function toggleFavDetail(m) {
  if (favs[m.imdbID]) { delete favs[m.imdbID]; } else { favs[m.imdbID] = m; }
  saveFavs();
  const btn = document.getElementById('detail-fav-btn');
  if (!btn) return;
  const nowFaved = isFav(m.imdbID);
  btn.className = 'fav-btn' + (nowFaved ? ' active' : '');
  btn.innerHTML = nowFaved ? '♥ Saved to favourites' : '♡ Add to favourites';
}

function goBack() {
  if (detailFrom === 'favs') { renderFavs(); } else { renderList(currentResults); }
}

updateFavCount();
</script>
</body>
</html>
